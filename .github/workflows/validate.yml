name: validate

# Contract gate for THIS repo: engine tests + schema validation + the fail-closed secret gate +
# an independent OSS second secret gate + SKILL.md lint. Least privilege — read-only token.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  engine-and-contract:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs by Renovate (see renovate.json); tags shown for readability.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hash-pinned deps + engine
        # Third-party deps are installed with --require-hashes from the uv-generated lock; the engine
        # itself is installed --no-deps so nothing is resolved unpinned (supply-chain hardening).
        run: |
          python -m pip install --require-hashes -r engine/requirements-dev.lock
          python -m pip install --no-deps ./engine

      - name: Unit tests (incl. malicious-secret + injection-safety fixtures)
        run: python -m pytest engine -q

      - name: Schema-validate golden artifacts
        run: python -m latent_sre.cli validate examples/golden

      - name: Fail-closed secret/PII gate (primary)
        # engine/ and the lockfiles are intentionally excluded (they contain detector patterns /
        # high-entropy hashes by design).
        run: python -m latent_sre.cli redact examples lib docs

      - name: Independent OSS second secret gate (detect-secrets)
        run: python tools/second_secret_gate.py

      - name: Lint SKILL.md frontmatter
        run: python tools/lint_skills.py
