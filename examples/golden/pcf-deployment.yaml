apiVersion: sre.latent-sre/v1
kind: PcfDeployment
service: checkout
spec:
  org: payments
  space: prod
  instances: 4
  memory: 1G
  disk: 1G
  buildpacks: [java_buildpack_offline]
  routes: [checkout.example.com]
  boundServices: [checkout-postgres, checkout-config]
  strategy: blue-green
  autoscale:
    min: 2
    max: 10
    metric: cpu
  logDrains: ['syslog-tls://logs.example.com:6514']
  healthCheck:
    type: http
    endpoint: /actuator/health
    timeout: 5
    invocationTimeout: 10
provenance:
  repo: github.com/acme/checkout
  commit: 9d779ba
  scanDate: '2026-06-04T12:00:00Z'
  skill: map-pcf-application
ownership: platform
confidence: medium
needs-human-review: true
